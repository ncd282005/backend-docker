name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Clone repository to web root
        run: |
          cd /var/www/html/
          sudo git clone https://github.com/ncd282005/backend-docker.git 
      - name: Verify deployment
        run: |
          ls -la /var/www/html

